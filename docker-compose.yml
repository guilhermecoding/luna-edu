services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: luna
      POSTGRES_PASSWORD: luna_secret
      POSTGRES_DB: luna_edu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luna -d luna_edu"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NAME_CORPORATION: ${NEXT_PUBLIC_NAME_CORPORATION}
        NEXT_PUBLIC_LOGO_CORPORATION: ${NEXT_PUBLIC_LOGO_CORPORATION}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
